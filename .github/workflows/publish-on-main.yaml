name: Publish on main after tests

on:
  workflow_run:
    workflows: ["Flake8 and pytest"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine next version
        id: version
        run: |
          DATE_TAG=$(date -u +"%Y.%m.%d")
          echo "version=v${DATE_TAG}.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          python3 .github/helpers/update_manifest.py --version ${{ steps.version.outputs.version }}

      - name: Build release asset
        run: |
          cd custom_components/energiek
          zip energiek.zip -r ./

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: custom_components/energiek/energiek.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
